{% extends 'base.html' %}

{% block title %}Оплата прошла успешно — СпортРядом{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm text-center">
                <div class="card-body py-5">
                    <div class="mb-3">
                        <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                    </div>
                    <h2 class="fw-bold mb-1">Оплата прошла успешно</h2>
                    <p class="text-muted mb-3">
                        Сумма: <strong class="text-success">{{ intent.amount }} ₽</strong>
                    </p>
                    <p class="text-muted small mb-4">
                        Платёж <code>{{ intent.yookassa_payment_id }}</code> подтверждён ЮКассой.
                        Аренда будет обработана в ближайшее время.
                    </p>
                    <a href="{% url 'rentals:detail' rental.rental_id %}" class="btn btn-primary px-4">
                        <i class="bi bi-arrow-left me-1"></i> К моей аренде
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
