{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Смена пароля — СпортРядом{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 480px;">
    <div class="card shadow-sm">
        <div class="card-header bg-white d-flex align-items-center gap-2">
            <span style="font-size:1.2rem;">🔑</span>
            <h5 class="mb-0">Смена пароля</h5>
        </div>
        <div class="card-body">
            <form method="post" novalidate>
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-grid gap-2 mt-3">
                    <button type="submit" class="btn btn-primary">Сохранить новый пароль</button>
                    <a href="{% url 'users:profile' %}" class="btn btn-outline-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
