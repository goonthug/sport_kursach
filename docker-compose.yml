services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${DB_NAME:-sportrent}
      POSTGRES_USER: ${DB_USER:-sportrent}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sportrent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sportrent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-sportrent_logs}
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  web:
    build: .
    volumes:
      - ./sportrent:/app/sportrent
      - static_volume:/app/sportrent/staticfiles
      - media_volume:/app/sportrent/media
    env_file:
      - .env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      MONGO_URL: mongodb://mongo:27017/
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    environment:
      VITE_YANDEX_MAPS_KEY: ${YANDEX_MAPS_KEY:-}
    depends_on:
      - web

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/sportrent/staticfiles
      - media_volume:/app/sportrent/media
    depends_on:
      - web
      - frontend

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  static_volume:
  media_volume:
